<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>galerie image</title>
</head>

<body>
    <h1>Ma Galerie Photo du Cameroun</h1>

    <!-- texte d'introduction -->
    <p>
        bienvenu dans notre bibliotheque d'image du cameroun
    </p>
    <!-- paysages -->
    <figure>
        <img width="400px" height="400px" src="./img/Cameroun.jpeg" alt="batiment a cote de la poste centrale">
        <figcaption>batiment a cote de la poste centrale</figcaption>
        <img width="400px" height="400px" src="./img/yaounde1.jpeg" alt="ville de yaounde">
        <figcaption>ville de yaounde</figcaption>
    </figure>
    <!-- villes -->
    <figure>
        <img width="400px" height="400px" src="./img/monument2.jpeg" alt="momument du rond point deido">
        <figcaption>momument du rond point deido</figcaption>
        <img width="400px" height="400px" src="./img/moto.jpeg" alt="moto dans la rue">
        <figcaption>moto dans la rue</figcaption>
    </figure>
    <!-- cultures -->
    <figure>
        <img width="400px" height="400px" src="./img/monument2.jpeg" alt="momument du rond point deido">
        <figcaption>monument de la reunification</figcaption>
        <img width="400px" height="400px" src="./img/yaounde2.jpeg" alt="ville de yaounde avec des batiments ">
        <figcaption>ville de yaounde avec des batiments </figcaption>
    </figure>
</body>

</html>
